# =============================================================================
# MMORE Docker Compose — Docker 20.10.8 compatible
# =============================================================================
# Usage:
#   Build:        DOCKER_BUILDKIT=0 docker compose build
#   Ollama:       docker compose up -d ollama
#   Pull model:   docker exec -it ollama ollama pull qwen3.5:latest
#   Process:      docker compose --profile pipeline run --rm mmore-process
#   Postprocess:  docker compose --profile pipeline run --rm mmore-postprocess
#   Index:        docker compose --profile setup run --rm mmore-index
#   RAG API:      docker compose up -d mmore-rag
# =============================================================================

version: '3.8'

services:

  # ── Ollama (LLM serving on GPU 0) ─────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: ollama
    privileged: true
    network_mode: host
    volumes:
      - ollama_storage:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
    restart: unless-stopped

  # ── 1. Process raw documents (run once) ───────────────────────────────────
  mmore-process:
    build:
      context: .
      args:
        INSTALL_EXTRAS: "all"
    container_name: mmore-process
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./configs:/app/configs
      - ./data_ingestion:/app/data_ingestion
    command: ["python", "-m", "mmore", "process", "--config-file", "/app/configs/sk_rektor_process_docker.yaml"]
    profiles: ["pipeline"]

  # ── 2. Postprocess / chunk (run once, after process) ──────────────────────
  mmore-postprocess:
    build:
      context: .
      args:
        INSTALL_EXTRAS: "all"
    container_name: mmore-postprocess
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./configs:/app/configs
      - ./data_ingestion:/app/data_ingestion
    command: >
      python -m mmore postprocess
        --config-file /app/configs/sk_rektor_postprocess_docker.yaml
        --input-data /app/data_ingestion/outputs/process/results.jsonl
    profiles: ["pipeline"]

  # ── 3. Index into Milvus Lite (run once, after postprocess) ───────────────
  mmore-index:
    build:
      context: .
      args:
        INSTALL_EXTRAS: "rag"
    container_name: mmore-index
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./configs:/app/configs
      - ./data_ingestion:/app/data_ingestion
    command: ["python", "-m", "mmore", "index", "--config-file", "/app/configs/sk_rektor_index_docker.yaml"]
    profiles: ["setup"]

  # ── 4. RAG API (runs forever, serves queries on port 8000) ────────────────
  mmore-rag:
    build:
      context: .
      args:
        INSTALL_EXTRAS: "rag"
    container_name: mmore-rag
    privileged: true
    network_mode: host
    security_opt:
      - seccomp:unconfined
    volumes:
      - ./configs:/app/configs
      - ./data_ingestion:/app/data_ingestion
    environment:
      - OPENAI_API_KEY=dummy
      - NVIDIA_VISIBLE_DEVICES=1
      - CUDA_VISIBLE_DEVICES=0
    command: ["python", "-m", "mmore", "rag", "--config-file", "/app/configs/sk_rektor_rag_docker.yaml"]
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_storage:
